spring.application.name=backend

# ===============================
# DATABASE CONFIGURATION
# ===============================
# Use environment variables for production (Supabase/Render)
# Default to local MySQL for local development
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.wnrdpxzpgwfkscahyhml.supabase.co:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Driver (Auto-detected, but specifying Postgres as primary for deployment)
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
# Hibernate DDL Auto (update/none)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialect - Overridden by env var in production for PostgreSQL
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# ===============================
# SECURITY / JWT
# ===============================
jwt.secret=${JWT_SECRET:bXktc3VwZXItc2VjdXJlLTI1Ni1iaXQta2V5LWhlcmU=}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}