spring.application.name=backend

# ===============================
# DATABASE CONFIGURATION
# ===============================
# Default to local H2 for development if no external DB provided
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:dukaandost;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# ===============================
# SECURITY / JWT
# ===============================
jwt.secret=${JWT_SECRET:bXktc3VwZXItc2VjdXJlLTI1Ni1iaXQta2V5LWhlcmU=}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ===============================
# AI / GROQ CONFIG
# ===============================
# Required: set the GROQ_API_KEY environment variable before running the application
groq.api.key=${GROQ_API_KEY}

# ===============================
# SERVER & APP CONFIG
# ===============================
server.port=${PORT:8080}
spring.main.allow-bean-definition-overriding=true
spring.h2.console.enabled=true