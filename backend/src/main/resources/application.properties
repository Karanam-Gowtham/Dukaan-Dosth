spring.application.name=dukaan-dosth

# Default: in-memory H2 (application-local.properties). For Postgres/Neon: SPRING_PROFILES_ACTIVE=postgres
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ===============================
# NEON POSTGRESQL CONFIGURATION
# ===============================
# Set via environment or .env (never commit real credentials)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dukaan}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dukaan}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-for-local-dev-only}
jwt.expiration=86400000

# ===============================
# GROQ AI CONFIG
# ===============================
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama3-8b-8192

# ===============================
# SERVER CONFIG
# ===============================
server.port=8080
# Accept connections from other devices on your LAN (e.g. phone testing)
server.address=0.0.0.0
