spring.application.name=backend

# ===============================
# DATABASE CONFIGURATION
# ===============================
# Use environment variables for production (Supabase/Render)
# Default to local MySQL for local development
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (Optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
# Hibernate DDL Auto (update/none)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialect - Overridden by env var in production for PostgreSQL
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# ===============================
# SECURITY / JWT
# ===============================
jwt.secret=${JWT_SECRET:bXktc3VwZXItc2VjdXJlLTI1Ni1iaXQta2V5LWhlcmU=}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}