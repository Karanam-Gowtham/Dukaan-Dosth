# Overrides for @ActiveProfiles("test") — in-memory DB, no external Postgres
spring.datasource.url=jdbc:h2:mem:dukaan_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

groq.api.key=test-dummy-key
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama3-8b-8192

jwt.secret=test-jwt-secret-at-least-256-bits-for-hs256-algorithm-testing-only
jwt.expiration=86400000
